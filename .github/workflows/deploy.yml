name: Deploy to Cloudflare Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  deployments: write
concurrency:
  group: "cf-pages-monitorescontraincendios"
  cancel-in-progress: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Historia completa: el sitemap resuelve lastmod real con git log
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npx astro check
      - run: npm run build
      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@3 pages project create monitorescontraincendios --production-branch=main 2>/dev/null || true
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # OJO: el production branch del proyecto Pages es "production" (creado por
          # el deploy manual de package.json). Con --branch=main el CI solo generaba
          # previews y el dominio quedaba congelado. --branch=production = produccion.
          command: pages deploy dist --project-name=monitorescontraincendios --branch=production --commit-dirty=true
